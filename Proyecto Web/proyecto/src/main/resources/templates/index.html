<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - InventarioPro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        h1 { color: #333; margin-bottom: 30px; font-size: 24px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-top: 4px solid #007bff;
        }
        .stat-card.green { border-top-color: #28a745; }
        .stat-card.orange { border-top-color: #fd7e14; }
        .stat-card.purple { border-top-color: #6f42c1; }
        .stat-number { font-size: 42px; font-weight: 700; color: #333; }
        .stat-label { color: #888; font-size: 14px; margin-top: 5px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .card h2 { font-size: 16px; color: #333; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #f0f2f5; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; padding: 8px 10px; color: #888; font-weight: 600; border-bottom: 1px solid #eee; }
        td { padding: 10px; border-bottom: 1px solid #f5f5f5; color: #555; }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-entrada { background: #d4edda; color: #155724; }
        .badge-salida { background: #f8d7da; color: #721c24; }
        .badge-ajuste { background: #fff3cd; color: #856404; }
        .alert-item { padding: 10px; border-radius: 6px; background: #fff3cd; margin-bottom: 8px; font-size: 14px; color: #856404; }
        .empty-msg { color: #aaa; font-size: 14px; text-align: center; padding: 20px 0; }
        .btn { padding: 8px 18px; border-radius: 5px; text-decoration: none; font-size: 13px; display: inline-block; margin-top: 10px; }
        .btn-primary { background: #007bff; color: white; }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
    <h1>Dashboard</h1>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-number" th:text="${totalProductos}">0</div>
            <div class="stat-label">Productos</div>
        </div>
        <div class="stat-card green">
            <div class="stat-number" th:text="${totalCategorias}">0</div>
            <div class="stat-label">Categorías</div>
        </div>
        <div class="stat-card orange">
            <div class="stat-number" th:text="${totalSucursales}">0</div>
            <div class="stat-label">Sucursales</div>
        </div>
        <div class="stat-card purple">
            <div class="stat-number" th:text="${totalMovimientos}">0</div>
            <div class="stat-label">Movimientos</div>
        </div>
    </div>

    <div class="row">
        <div class="card">
            <h2>&#9888; Alertas de Stock Bajo</h2>
            <div th:if="${alertasStock.isEmpty()}" class="empty-msg">Sin alertas de stock</div>
            <div th:each="p : ${alertasStock}" class="alert-item">
                <strong th:text="${p.nombre}"></strong>
                — Stock: <span th:text="${p.cantidad}"></span> / Mínimo: <span th:text="${p.stockMinimo}"></span>
            </div>
            <a href="/productos" class="btn btn-primary">Ver productos</a>
        </div>

        <div class="card">
            <h2>&#128203; Últimos Movimientos</h2>
            <div th:if="${ultimosMovimientos.isEmpty()}" class="empty-msg">Sin movimientos registrados</div>
            <table th:if="${!ultimosMovimientos.isEmpty()}">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Tipo</th>
                        <th>Cantidad</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${ultimosMovimientos}">
                        <td th:text="${m.producto.nombre}"></td>
                        <td>
                            <span th:text="${m.tipoMovimiento}"
                                  th:classappend="${m.tipoMovimiento.name() == 'ENTRADA'} ? 'badge badge-entrada' :
                                                 (${m.tipoMovimiento.name() == 'SALIDA'} ? 'badge badge-salida' : 'badge badge-ajuste')">
                            </span>
                        </td>
                        <td th:text="${m.cantidad}"></td>
                    </tr>
                </tbody>
            </table>
            <a href="/movimientos" class="btn btn-primary">Ver todos</a>
        </div>
    </div>
</div>
</body>
</html>
