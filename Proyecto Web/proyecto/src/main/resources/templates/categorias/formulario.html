<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${categoria.id != null ? 'Editar Categoría' : 'Nueva Categoría'}">Categoría</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; }
        .container { max-width: 600px; margin: 0 auto; padding: 30px 20px; }
        h1 { color: #333; margin-bottom: 25px; font-size: 22px; }
        .card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .alert { padding: 12px 16px; margin-bottom: 20px; border-radius: 6px; background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 7px; color: #444; font-weight: 500; font-size: 14px; }
        input, textarea { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; transition: border-color 0.2s; }
        input:focus, textarea:focus { outline: none; border-color: #007bff; box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }
        textarea { resize: vertical; min-height: 90px; }
        .required { color: #dc3545; }
        .form-actions { display: flex; gap: 10px; margin-top: 25px; }
        .btn { padding: 10px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; text-decoration: none; display: inline-block; transition: background-color 0.2s; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-primary:hover { background-color: #0056b3; }
        .btn-secondary { background-color: #6c757d; color: white; }
        .btn-secondary:hover { background-color: #5a6268; }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
    <h1 th:text="${categoria.id != null ? 'Editar Categoría' : 'Nueva Categoría'}"></h1>

    <div class="card">
        <div class="alert" th:if="${error}" th:text="${error}"></div>

        <form method="post" th:action="@{/categorias}">
            <input type="hidden" name="id" th:value="${categoria.id}">

            <div class="form-group">
                <label>Nombre <span class="required">*</span></label>
                <input type="text" name="nombre" th:value="${categoria.nombre}" required maxlength="100">
            </div>

            <div class="form-group">
                <label>Descripción</label>
                <textarea name="descripcion" th:text="${categoria.descripcion}" maxlength="300"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a href="/categorias" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
