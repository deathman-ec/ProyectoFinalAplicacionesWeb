<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="nav">
    <style>
        .navbar {
            background-color: #1a1a2e;
            padding: 0 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }
        .nav-brand {
            color: #e94560;
            font-size: 20px;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 1px;
        }
        .nav-links {
            display: flex;
            gap: 5px;
        }
        .nav-links a {
            color: #ccc;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 5px;
            font-size: 14px;
            transition: background-color 0.2s, color 0.2s;
        }
        .nav-links a:hover {
            background-color: #e94560;
            color: white;
        }
    </style>
    <div class="navbar">
        <div class="nav-inner">
            <a href="/" class="nav-brand">&#128230; InventarioPro</a>
            <div class="nav-links">
                <a href="/">Dashboard</a>
                <a href="/categorias">Categorías</a>
                <a href="/productos">Productos</a>
                <a href="/sucursales">Sucursales</a>
                <a href="/movimientos">Movimientos</a>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
