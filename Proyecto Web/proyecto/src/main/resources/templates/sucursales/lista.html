<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucursales - InventarioPro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; }
        .container { max-width: 1000px; margin: 0 auto; padding: 30px 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h1 { color: #333; font-size: 22px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; transition: background-color 0.2s; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-primary:hover { background-color: #0056b3; }
        .btn-warning { background-color: #ffc107; color: #333; padding: 5px 12px; font-size: 12px; }
        .btn-warning:hover { background-color: #e0a800; }
        .btn-danger { background-color: #dc3545; color: white; padding: 5px 12px; font-size: 12px; }
        .btn-danger:hover { background-color: #c82333; }
        .card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #1a1a2e; color: white; padding: 14px 16px; text-align: left; font-weight: 500; }
        td { padding: 13px 16px; border-bottom: 1px solid #f0f0f0; color: #555; }
        tr:hover td { background-color: #fafafa; }
        .acciones { display: flex; gap: 8px; }
        .empty-msg { text-align: center; padding: 50px; color: #aaa; font-size: 15px; }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
    <div class="page-header">
        <h1>Sucursales</h1>
        <a href="/sucursales/nueva" class="btn btn-primary">+ Nueva Sucursal</a>
    </div>

    <div class="card">
        <div th:if="${sucursales.isEmpty()}" class="empty-msg">
            No hay sucursales registradas. ¡Crea la primera!
        </div>
        <table th:if="${!sucursales.isEmpty()}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Dirección</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="s : ${sucursales}">
                    <td th:text="${s.id}"></td>
                    <td th:text="${s.nombre}"></td>
                    <td th:text="${s.direccion}"></td>
                    <td class="acciones">
                        <a th:href="@{/sucursales/editar/{id}(id=${s.id})}" class="btn btn-warning">Editar</a>
                        <a th:href="@{/sucursales/eliminar/{id}(id=${s.id})}" class="btn btn-danger"
                           onclick="return confirm('¿Eliminar esta sucursal?')">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
