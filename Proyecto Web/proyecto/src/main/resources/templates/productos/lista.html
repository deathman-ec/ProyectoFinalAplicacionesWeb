<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - InventarioPro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h1 { color: #333; font-size: 22px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; transition: background-color 0.2s; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-primary:hover { background-color: #0056b3; }
        .btn-warning { background-color: #ffc107; color: #333; padding: 5px 12px; font-size: 12px; }
        .btn-warning:hover { background-color: #e0a800; }
        .btn-danger { background-color: #dc3545; color: white; padding: 5px 12px; font-size: 12px; }
        .btn-danger:hover { background-color: #c82333; }
        .alert-banner { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; color: #856404; font-size: 14px; }
        .card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #1a1a2e; color: white; padding: 14px 16px; text-align: left; font-weight: 500; font-size: 13px; }
        td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; color: #555; font-size: 14px; }
        tr:hover td { background-color: #fafafa; }
        .acciones { display: flex; gap: 8px; }
        .precio { color: #28a745; font-weight: 600; }
        .stock-ok { color: #28a745; font-weight: 600; }
        .stock-bajo { color: #dc3545; font-weight: 600; }
        .badge-cat { background: #e3f2fd; color: #1565c0; padding: 3px 10px; border-radius: 12px; font-size: 12px; }
        .empty-msg { text-align: center; padding: 50px; color: #aaa; font-size: 15px; }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
    <div class="page-header">
        <h1>Productos</h1>
        <a href="/productos/nuevo" class="btn btn-primary">+ Nuevo Producto</a>
    </div>

    <div class="alert-banner" th:if="${!alertasStock.isEmpty()}">
        &#9888; <strong th:text="${alertasStock.size()}"></strong> producto(s) con stock por debajo del mínimo.
        <a href="#" style="color:#856404;font-weight:600;margin-left:5px;">Ver detalles &#8595;</a>
    </div>

    <div class="card">
        <div th:if="${productos.isEmpty()}" class="empty-msg">
            No hay productos registrados. ¡Crea el primero!
        </div>
        <table th:if="${!productos.isEmpty()}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Descripción</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Mínimo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${productos}">
                    <td th:text="${p.id}"></td>
                    <td><strong th:text="${p.nombre}"></strong></td>
                    <td>
                        <span th:if="${p.categoria != null}" th:text="${p.categoria.nombre}" class="badge-cat"></span>
                        <span th:if="${p.categoria == null}" style="color:#ccc">—</span>
                    </td>
                    <td th:text="${p.descripcion}"></td>
                    <td class="precio">$<span th:text="${#numbers.formatDecimal(p.precio, 1, 2)}"></span></td>
                    <td th:text="${p.cantidad}"
                        th:class="${p.stockBajo} ? 'stock-bajo' : 'stock-ok'"></td>
                    <td th:text="${p.stockMinimo != null ? p.stockMinimo : '—'}"></td>
                    <td class="acciones">
                        <a th:href="@{/productos/editar/{id}(id=${p.id})}" class="btn btn-warning">Editar</a>
                        <a th:href="@{/productos/eliminar/{id}(id=${p.id})}" class="btn btn-danger"
                           onclick="return confirm('¿Eliminar este producto?')">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
