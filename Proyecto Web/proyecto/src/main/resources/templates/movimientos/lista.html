<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimientos de Inventario - InventarioPro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h1 { color: #333; font-size: 22px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; transition: background-color 0.2s; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-primary:hover { background-color: #0056b3; }
        .card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #1a1a2e; color: white; padding: 14px 16px; text-align: left; font-weight: 500; font-size: 13px; }
        td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; color: #555; font-size: 14px; }
        tr:hover td { background-color: #fafafa; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-ENTRADA { background: #d4edda; color: #155724; }
        .badge-SALIDA  { background: #f8d7da; color: #721c24; }
        .badge-AJUSTE  { background: #fff3cd; color: #856404; }
        .empty-msg { text-align: center; padding: 50px; color: #aaa; font-size: 15px; }
        .cantidad-pos { color: #28a745; font-weight: 600; }
        .cantidad-neg { color: #dc3545; font-weight: 600; }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
    <div class="page-header">
        <h1>Movimientos de Inventario</h1>
        <a href="/movimientos/nuevo" class="btn btn-primary">+ Registrar Movimiento</a>
    </div>

    <div class="card">
        <div th:if="${movimientos.isEmpty()}" class="empty-msg">
            No hay movimientos registrados aún.
        </div>
        <table th:if="${!movimientos.isEmpty()}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Producto</th>
                    <th>Sucursal</th>
                    <th>Tipo</th>
                    <th>Cantidad</th>
                    <th>Observación</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="m : ${movimientos}">
                    <td th:text="${m.id}"></td>
                    <td th:text="${#temporals.format(m.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${m.producto.nombre}"></td>
                    <td th:text="${m.sucursal.nombre}"></td>
                    <td>
                        <span th:text="${m.tipoMovimiento}"
                              th:class="'badge badge-' + ${m.tipoMovimiento.name()}"></span>
                    </td>
                    <td th:text="${m.cantidad}"
                        th:class="${m.tipoMovimiento.name() == 'SALIDA'} ? 'cantidad-neg' : 'cantidad-pos'"></td>
                    <td th:text="${m.observacion}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
