<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Movimiento - InventarioPro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; }
        .container { max-width: 650px; margin: 0 auto; padding: 30px 20px; }
        h1 { color: #333; margin-bottom: 25px; font-size: 22px; }
        .card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .alert { padding: 12px 16px; margin-bottom: 20px; border-radius: 6px; background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 7px; color: #444; font-weight: 500; font-size: 14px; }
        input, textarea, select {
            width: 100%; padding: 10px 14px; border: 1px solid #ddd;
            border-radius: 6px; font-size: 14px; font-family: inherit;
            transition: border-color 0.2s; background-color: white;
        }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #007bff; box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }
        textarea { resize: vertical; min-height: 80px; }
        .required { color: #dc3545; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .stock-info { font-size: 12px; color: #888; margin-top: 5px; }
        .form-actions { display: flex; gap: 10px; margin-top: 25px; }
        .btn { padding: 10px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; text-decoration: none; display: inline-block; transition: background-color 0.2s; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-primary:hover { background-color: #0056b3; }
        .btn-secondary { background-color: #6c757d; color: white; }
        .btn-secondary:hover { background-color: #5a6268; }
        .tipo-select option[value="ENTRADA"] { color: #155724; font-weight: 600; }
        .tipo-select option[value="SALIDA"]  { color: #721c24; font-weight: 600; }
        .tipo-select option[value="AJUSTE"]  { color: #856404; font-weight: 600; }
    </style>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">
    <h1>Registrar Movimiento de Inventario</h1>

    <div class="card">
        <div class="alert" th:if="${error}" th:text="${error}"></div>

        <form method="post" th:action="@{/movimientos}">

            <div class="form-group">
                <label>Producto <span class="required">*</span></label>
                <select name="productoId" required>
                    <option value="">-- Seleccione un producto --</option>
                    <option th:each="p : ${productos}"
                            th:value="${p.id}"
                            th:text="${p.nombre + ' (Stock: ' + p.cantidad + ')'}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Sucursal <span class="required">*</span></label>
                <select name="sucursalId" required>
                    <option value="">-- Seleccione una sucursal --</option>
                    <option th:each="s : ${sucursales}"
                            th:value="${s.id}"
                            th:text="${s.nombre}">
                    </option>
                </select>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Tipo de Movimiento <span class="required">*</span></label>
                    <select name="tipoMovimiento" class="tipo-select" required>
                        <option value="">-- Seleccione --</option>
                        <option th:each="tipo : ${tipos}"
                                th:value="${tipo.name()}"
                                th:text="${tipo.name()}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Cantidad <span class="required">*</span></label>
                    <input type="number" name="cantidad" min="1" required>
                    <div class="stock-info">Para AJUSTE: el stock quedará igual a este valor</div>
                </div>
            </div>

            <div class="form-group">
                <label>Observación</label>
                <textarea name="observacion" maxlength="500" placeholder="Motivo del movimiento (opcional)"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Registrar</button>
                <a href="/movimientos" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
